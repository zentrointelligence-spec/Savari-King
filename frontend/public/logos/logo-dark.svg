<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 470" width="500" height="470">
  <defs>
    <!-- Luxury gold gradient -->
    <linearGradient id="gd-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EDD98C"/>
      <stop offset="30%"  stop-color="#C9A84C"/>
      <stop offset="65%"  stop-color="#A8872A"/>
      <stop offset="100%" stop-color="#D4AF5C"/>
    </linearGradient>
    <!-- Subtle ivory-gold for S letter -->
    <linearGradient id="gd-ivory" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0EBE3"/>
      <stop offset="100%" stop-color="#D8D0C4"/>
    </linearGradient>
    <!-- Slightly lighter green for illustration fills on dark bg -->
    <linearGradient id="gd-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2A4A2A"/>
      <stop offset="100%" stop-color="#1E3A1E"/>
    </linearGradient>
    <!-- Glow for circle ring on dark -->
    <filter id="gd-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#C9A84C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ──────────────────────────────── -->
  <rect width="500" height="470" fill="#0C1C0C"/>

  <!-- Subtle background vignette (deeper corners) -->
  <radialGradient id="gd-vignette" cx="50%" cy="45%" r="60%">
    <stop offset="0%"   stop-color="#122012" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060E06" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="500" height="470" fill="url(#gd-vignette)"/>

  <!-- ── EMBLEM CIRCLE RINGS ─────────────────────── -->
  <!-- Outer ring with subtle gold glow -->
  <circle cx="250" cy="185" r="82" fill="none" stroke="url(#gd-gold)" stroke-width="1.5" filter="url(#gd-glow)"/>
  <!-- Inner hairline ring -->
  <circle cx="250" cy="185" r="76" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.4"/>

  <!-- ── CROWN ───────────────────────────────────── -->
  <!-- Three-spike elegant crown -->
  <path d="
    M 222 143
    L 226 124
    L 237 135
    L 250 116
    L 263 135
    L 274 124
    L 278 143
    Z
  " fill="url(#gd-gold)"/>
  <!-- Crown base band -->
  <rect x="220" y="140" width="60" height="8" rx="4" fill="url(#gd-gold)"/>
  <!-- Dark pearl dots at valley tips -->
  <circle cx="231.5" cy="133" r="3"   fill="#0C1C0C"/>
  <circle cx="268.5" cy="133" r="3"   fill="#0C1C0C"/>
  <!-- Glowing center peak gem -->
  <circle cx="250"   cy="115" r="3.5" fill="#EDD98C"/>
  <!-- Faint sparkle lines around crown peak -->
  <line x1="250" y1="108" x2="250" y2="111" stroke="#EDD98C" stroke-width="0.8" opacity="0.7"/>
  <line x1="246" y1="110" x2="248" y2="112" stroke="#EDD98C" stroke-width="0.8" opacity="0.5"/>
  <line x1="254" y1="110" x2="252" y2="112" stroke="#EDD98C" stroke-width="0.8" opacity="0.5"/>

  <!-- ── SK MONOGRAM ──────────────────────────────── -->
  <!-- S — warm ivory, italic serif -->
  <text
    x="238" y="213"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', 'Times New Roman', serif"
    font-size="88" font-weight="bold" font-style="italic"
    fill="url(#gd-ivory)" text-anchor="middle">S</text>
  <!-- K — luxury gold, overlaps right side of S -->
  <text
    x="264" y="213"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', 'Times New Roman', serif"
    font-size="88" font-weight="bold" font-style="italic"
    fill="url(#gd-gold)" text-anchor="middle">K</text>

  <!-- ── LIGHTHOUSE ─────────────────────────────── -->
  <!-- Gold light beams (more visible on dark bg) -->
  <line x1="116" y1="161" x2="92"  y2="143" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="116" y1="161" x2="87"  y2="161" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="116" y1="161" x2="91"  y2="179" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Outer light cone (very subtle) -->
  <path d="M 116 161 L 75 130 L 72 192 Z" fill="#C9A84C" opacity="0.04"/>
  <!-- Tower body: slightly lighter green fills on dark bg -->
  <path d="M 109 262 L 124 262 L 122 172 L 111 172 Z" fill="url(#gd-fill)"/>
  <!-- Thin gold outline on tower -->
  <path d="M 109 262 L 124 262 L 122 172 L 111 172 Z" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
  <!-- Lantern room box -->
  <rect x="106" y="162" width="21" height="12" rx="1.5" fill="url(#gd-gold)"/>
  <!-- Inner glow (brighter on dark bg) -->
  <rect x="108" y="164" width="17" height="8"  rx="1"   fill="#EDD98C" opacity="0.75"/>
  <!-- Roof cap -->
  <path d="M 105 162 L 116.5 150 L 128 162 Z" fill="url(#gd-gold)"/>
  <!-- Foundation base -->
  <rect x="104" y="260" width="28" height="5" rx="2.5" fill="url(#gd-gold)"/>
  <!-- Door hint -->
  <rect x="113" y="244" width="8" height="17" rx="4" fill="#C9A84C" opacity="0.45"/>

  <!-- ── ELEGANT SEDAN ──────────────────────────── -->
  <!-- Car body: lighter green to stand out on dark bg -->
  <path d="
    M 330 262
    L 330 238
    Q 330 235 334 234
    L 340 234
    Q 347 217 363 210
    Q 382 204 398 210
    Q 404 214 407 221
    L 416 231
    Q 422 231 423 237
    Q 424 243 419 246
    L 419 262
    Z
  " fill="url(#gd-fill)"/>
  <!-- Thin gold body outline -->
  <path d="
    M 330 262
    L 330 238
    Q 330 235 334 234
    L 340 234
    Q 347 217 363 210
    Q 382 204 398 210
    Q 404 214 407 221
    L 416 231
    Q 422 231 423 237
    Q 424 243 419 246
    L 419 262
  " fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.55"/>
  <!-- Cabin glass (gold tint, more visible on dark) -->
  <path d="
    M 342 234
    Q 349 219 362 212
    Q 381 206 396 212
    Q 401 216 404 222
    L 413 233
    L 344 235
    Z
  " fill="#C9A84C" opacity="0.18"/>
  <!-- Headlight detail -->
  <path d="M 416 237 Q 422 240 423 248" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Wheel arch cutouts (match dark bg) -->
  <ellipse cx="358" cy="262" rx="18" ry="9" fill="#0C1C0C"/>
  <ellipse cx="405" cy="262" rx="18" ry="9" fill="#0C1C0C"/>
  <!-- Left wheel -->
  <circle cx="358" cy="264" r="15" fill="#060E06"/>
  <circle cx="358" cy="264" r="10" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="358" cy="264" r="4.5" fill="#C9A84C"/>
  <!-- Right wheel -->
  <circle cx="405" cy="264" r="15" fill="#060E06"/>
  <circle cx="405" cy="264" r="10" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="405" cy="264" r="4.5" fill="#C9A84C"/>

  <!-- ── LANDSCAPE WAVES ─────────────────────────── -->
  <!-- On dark bg, waves need to read as lighter than bg -->
  <!-- Wave 1 — back, subtle lighter green -->
  <path d="
    M 80 280
    Q 142 266 204 274
    Q 248 280 288 270
    Q 336 260 388 270
    Q 408 275 420 268
    L 420 292
    L 80  292
    Z
  " fill="#1A3A1A" opacity="0.50"/>
  <!-- Wave 2 — mid -->
  <path d="
    M 80 285
    Q 150 271 215 279
    Q 258 285 295 275
    Q 348 264 400 276
    Q 413 280 420 274
    L 420 292
    L 80  292
    Z
  " fill="#173017" opacity="0.80"/>
  <!-- Gold accent wave line (brighter on dark bg) -->
  <path d="
    M 80 285
    Q 150 271 215 279
    Q 258 285 295 275
    Q 348 264 400 276
    Q 413 280 420 274
  " fill="none" stroke="url(#gd-gold)" stroke-width="1.5" opacity="0.80"/>
  <!-- Wave 3 — front -->
  <path d="
    M 80 290
    Q 158 277 224 284
    Q 264 289 304 280
    Q 360 269 420 282
    L 420 292
    L 80  292
    Z
  " fill="#1A3A1A"/>

  <!-- ── BRAND TYPOGRAPHY ──────────────────────── -->

  <!-- SAVARI KING — gold display title -->
  <text
    x="250" y="338"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, 'Times New Roman', serif"
    font-size="44" font-weight="700"
    fill="url(#gd-gold)" text-anchor="middle" letter-spacing="10">SAVARI KING</text>

  <!-- Ornamental separator: line · diamond · line -->
  <line x1="84"  y1="355" x2="213" y2="355" stroke="#C9A84C" stroke-width="0.8" opacity="0.75"/>
  <path d="M 247 352 L 250 348 L 253 352 L 250 356 Z" fill="#C9A84C"/>
  <line x1="287" y1="355" x2="416" y2="355" stroke="#C9A84C" stroke-width="0.8" opacity="0.75"/>

  <!-- EBENEZER TOURS & TRAVELS — ivory subtitle -->
  <text
    x="250" y="377"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, 'Times New Roman', serif"
    font-size="12.5" font-weight="400"
    fill="#E8E0D0" text-anchor="middle" letter-spacing="5">EBENEZER TOURS &amp; TRAVELS</text>

  <!-- Thin rule line -->
  <line x1="150" y1="392" x2="350" y2="392" stroke="#C9A84C" stroke-width="0.5" opacity="0.45"/>

  <!-- TAGLINE — small italic, soft ivory -->
  <text
    x="250" y="411"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8.5" font-style="italic" font-weight="400"
    fill="#E8E0D0" fill-opacity="0.45" text-anchor="middle" letter-spacing="1.8">
    WHERE THE CONTINENT ENDS, WHERE YOUR JOURNEY BEGINS.
  </text>

  <!-- Bottom ornament — minimal gold diamond -->
  <path d="M 246.5 428 L 250 423.5 L 253.5 428 L 250 432.5 Z" fill="#C9A84C" opacity="0.65"/>
</svg>
