databases:
  - name: ebooking-postgres
    plan: free
    databaseName: ebookingsam
    user: ebooking_user

services:
  - type: web
    runtime: node
    name: ebooking-backend
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MIGRATE_ON_STARTUP
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ebooking-postgres
          property: connectionString
      - key: FRONTEND_HOST
        fromService:
          name: ebooking-frontend
          type: web
          property: host
      - key: JWT_SECRET
        generateValue: true

  - type: web
    runtime: static
    name: ebooking-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: ebooking-backend
          type: web
          property: host
